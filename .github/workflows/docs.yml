name: Docs

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"

jobs:
  link-check:
    name: Check README links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate README links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress README.md
          fail: true
